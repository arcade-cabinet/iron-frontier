<div class="absolute top-0 left-0 right-0 p-1 sm:p-2 pointer-events-none pt-safe safe-x" *ngIf="(gameStore.state$ | async) as state">
  <div class="bg-amber-950/90 border border-amber-800/60 backdrop-blur-md pointer-events-auto shadow-lg rounded-md">
    <div class="p-1.5 sm:p-2">
      <div class="flex items-center gap-2 sm:gap-3">
        <div class="flex items-center gap-1.5 sm:gap-2 pr-2 sm:pr-3 border-r border-amber-700/40">
          <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-amber-800/60 border border-amber-600/50 flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-amber-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <div class="min-w-0">
            <div class="text-amber-100 font-bold text-[10px] sm:text-xs truncate max-w-[50px] sm:max-w-[80px]">
              {{ state.playerName }}
            </div>
            <div class="flex items-center gap-1 text-amber-400/80 text-[9px] sm:text-[10px]">
              <svg class="w-3 h-3 text-amber-500" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
              </svg>
              <span>Lv.{{ state.playerStats.level }}</span>
            </div>
          </div>
        </div>

        <div class="flex-1 flex items-center gap-2 sm:gap-4">
          <div class="flex items-center gap-1 sm:gap-1.5 min-w-[70px] sm:min-w-[100px]">
            <svg class="w-3.5 h-3.5" [ngClass]="getHealthColor(getHealthPercent(state))" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
            <div class="flex-1 h-1 sm:h-1.5 bg-amber-900/60 rounded overflow-hidden">
              <div class="h-full" [ngClass]="getHealthBarClass(getHealthPercent(state))" [style.width.%]="getHealthPercent(state)"></div>
            </div>
            <span class="text-[9px] sm:text-[10px] font-mono w-6 sm:w-8 text-right" [ngClass]="getHealthColor(getHealthPercent(state))">
              {{ state.playerStats.health }}
            </span>
          </div>

          <div class="hidden sm:flex items-center gap-1.5 min-w-[80px]">
            <svg class="w-3 h-3 text-amber-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
            </svg>
            <div class="flex-1 h-1 bg-amber-900/60 rounded overflow-hidden">
              <div class="h-full bg-amber-500" [style.width.%]="getXpPercent(state)"></div>
            </div>
            <span class="text-amber-400/80 text-[10px] font-mono w-8 text-right">
              {{ state.playerStats.xp }}
            </span>
          </div>
        </div>

        <div class="flex items-center gap-1 sm:gap-1.5 pl-2 sm:pl-3 border-l border-amber-700/40">
          <svg class="w-3.5 h-3.5 text-yellow-500" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
          </svg>
          <span class="text-yellow-400 font-bold text-xs sm:text-sm min-w-[32px] sm:min-w-[40px] text-right">
            {{ state.playerStats.gold }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="flex items-start justify-between mt-1 sm:mt-1.5 gap-2">
    <div class="flex items-center gap-1 sm:gap-1.5 px-1.5 sm:px-2 py-0.5 sm:py-1 bg-amber-950/70 backdrop-blur-sm rounded border border-amber-800/40">
      <svg class="w-3.5 h-3.5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke-width="2" />
        <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88" fill="currentColor" />
      </svg>
      <span class="text-amber-200 text-[9px] sm:text-[10px] font-medium truncate max-w-[100px] sm:max-w-[150px]">
        {{ getCurrentLocationName(state) }}
      </span>
    </div>

    <div class="flex flex-col items-end gap-1 sm:flex-row sm:items-center sm:gap-2">
      <div class="flex items-center gap-1 px-1.5 py-0.5 bg-amber-950/70 backdrop-blur-sm rounded border border-amber-800/40">
        <svg class="w-3 h-3 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke-width="2" />
          <path d="M12 6v6l4 2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="text-[9px] sm:text-[10px] text-amber-200 font-medium">{{ getTimeLabel(state) }}</span>
      </div>

      <div class="flex items-center gap-1 px-1.5 py-0.5 bg-amber-950/70 backdrop-blur-sm rounded border border-amber-800/40">
        <svg class="w-3 h-3 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M7 21h10c1 0 2-1 2-2v-4c0-1-1-2-2-2h-1l-1-8c0-1-1-2-2-2H11c-1 0-2 1-2 2l-1 8H7c-1 0-2 1-2 2v4c0 1 1 2 2 2z" />
        </svg>
        <div class="flex items-center gap-1">
          <div class="h-1.5 w-10 rounded bg-amber-900/60">
            <div class="h-full bg-amber-500" [style.width.%]="getFatiguePercent(state)"></div>
          </div>
          <span class="text-[9px] text-amber-300">{{ getFatigueLabel(state) }}</span>
        </div>
      </div>

      <div class="hidden sm:flex items-center gap-1 px-1.5 py-0.5 bg-amber-950/70 backdrop-blur-sm rounded border border-amber-800/40">
        <svg class="w-3 h-3 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 12h18M5 7h14M5 17h14" />
        </svg>
        <div class="flex items-center gap-1">
          <div class="h-1.5 w-8 rounded bg-amber-900/60">
            <div class="h-full bg-amber-500" [style.width.%]="getFoodPercent(state)"></div>
          </div>
          <div class="h-1.5 w-8 rounded bg-amber-900/60">
            <div class="h-full bg-blue-400" [style.width.%]="getWaterPercent(state)"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="hidden sm:block max-w-[150px] md:max-w-[200px] px-2 py-1 bg-amber-950/70 backdrop-blur-sm rounded border border-amber-800/40" *ngIf="getActiveQuestSummary(state) as quest">
      <div class="flex items-center gap-1.5">
        <div class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></div>
        <span class="text-amber-300 text-[10px] font-medium truncate">
          {{ quest.title }}
        </span>
      </div>
      <div class="text-amber-400/70 text-[9px] truncate mt-0.5">
        {{ quest.objective }}
      </div>
    </div>
  </div>
</div>
