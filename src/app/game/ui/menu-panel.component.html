<div *ngIf="isOpen" class="fixed inset-0 z-50">
  <div class="absolute inset-0 bg-black/50" (click)="close()"></div>
  <div class="absolute inset-x-0 bottom-0 h-[85vh] sm:h-[75vh] bg-amber-950 border-t border-amber-800/60 rounded-t-2xl overflow-hidden panel-sheet" *ngIf="(gameStore.state$ | async) as state">
    <div class="p-3 border-b border-amber-800/50 flex items-center justify-between">
      <div class="flex items-center gap-2 text-amber-100">
        <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <span class="text-sm sm:text-base">Menu</span>
      </div>
      <button class="text-amber-400 hover:text-amber-200" (click)="close()" aria-label="Close">✕</button>
    </div>

    <div class="flex gap-2 px-3 py-2 border-b border-amber-800/30">
      <button
        class="px-3 py-1 rounded text-xs"
        [ngClass]="activeTab === 'game' ? 'bg-amber-700/60 text-amber-100' : 'bg-amber-900/30 text-amber-300'"
        (click)="activeTab = 'game'"
      >
        Game
      </button>
      <button
        class="px-3 py-1 rounded text-xs"
        [ngClass]="activeTab === 'settings' ? 'bg-amber-700/60 text-amber-100' : 'bg-amber-900/30 text-amber-300'"
        (click)="activeTab = 'settings'"
      >
        Settings
      </button>
    </div>

    <div class="p-3 overflow-y-auto h-[calc(85vh-96px)]">
      <ng-container *ngIf="activeTab === 'game'">
        <div class="space-y-3">
          <button class="w-full px-4 py-3 rounded-lg bg-amber-700 text-amber-100" (click)="saveGame()">
            Save Game
          </button>
          <button class="w-full px-4 py-3 rounded-lg border border-amber-700/50 text-amber-300" (click)="setPhase('title')">
            Return to Title
          </button>
          <button class="w-full px-4 py-3 rounded-lg border border-red-700/50 text-red-300" (click)="resetGame()">
            Reset Game
          </button>
        </div>
      </ng-container>

      <ng-container *ngIf="activeTab === 'settings'">
        <div class="space-y-4">
          <div>
            <div class="flex items-center justify-between text-xs text-amber-300">
              <span>Music Volume</span>
              <span class="font-mono">{{ roundPercent(state.settings.musicVolume) }}%</span>
            </div>
            <input
              type="range"
              min="0"
              max="1"
              step="0.05"
              [value]="state.settings.musicVolume"
              (input)="updateSetting('musicVolume', $any($event.target).valueAsNumber)"
              class="w-full"
            />
          </div>

          <div>
            <div class="flex items-center justify-between text-xs text-amber-300">
              <span>SFX Volume</span>
              <span class="font-mono">{{ roundPercent(state.settings.sfxVolume) }}%</span>
            </div>
            <input
              type="range"
              min="0"
              max="1"
              step="0.05"
              [value]="state.settings.sfxVolume"
              (input)="updateSetting('sfxVolume', $any($event.target).valueAsNumber)"
              class="w-full"
            />
          </div>

          <label class="flex items-center justify-between text-sm text-amber-200">
            <span>Haptics</span>
            <input type="checkbox" [checked]="state.settings.haptics" (change)="updateSetting('haptics', $any($event.target).checked)" />
          </label>

          <label class="flex items-center justify-between text-sm text-amber-200">
            <span>Reduced Motion</span>
            <input type="checkbox" [checked]="state.settings.reducedMotion" (change)="updateSetting('reducedMotion', $any($event.target).checked)" />
          </label>

          <label class="flex items-center justify-between text-sm text-amber-200">
            <span>Show Minimap</span>
            <input type="checkbox" [checked]="state.settings.showMinimap" (change)="updateSetting('showMinimap', $any($event.target).checked)" />
          </label>

          <label class="flex items-center justify-between text-sm text-amber-200">
            <span>Low Power Mode</span>
            <input type="checkbox" [checked]="state.settings.lowPowerMode" (change)="updateSetting('lowPowerMode', $any($event.target).checked)" />
          </label>
        </div>
      </ng-container>
    </div>
  </div>
</div>
