<div class="absolute top-16 left-1/2 -translate-x-1/2 z-40 flex flex-col items-center gap-2 w-full max-w-xs px-4" *ngIf="(gameStore.state$ | async) as state">
  <div
    *ngFor="let notification of state.notifications"
    class="flex items-center gap-2 px-3 py-2 rounded-lg border backdrop-blur-sm shadow-lg cursor-pointer transition-transform"
    [ngClass]="getBgClass(notification.type)"
    role="button"
    tabindex="0"
    (click)="remove(notification.id)"
    (keydown.enter)="remove(notification.id)"
    (keydown.space)="remove(notification.id)"
    [attr.aria-label]="'Dismiss notification: ' + notification.message"
  >
    <ng-container [ngSwitch]="notification.type">
      <svg *ngSwitchCase="'item'" class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
      <svg *ngSwitchCase="'xp'" class="w-4 h-4 text-purple-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg>
      <svg *ngSwitchCase="'quest'" class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      <svg *ngSwitchCase="'level'" class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      <svg *ngSwitchDefault class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </ng-container>
    <span class="text-white text-sm font-medium">{{ notification.message }}</span>
  </div>
</div>
