<div *ngIf="dialogue" class="absolute bottom-24 left-0 right-0 px-3 sm:px-4 z-30" data-testid="dialogue-box">
  <div class="bg-amber-950/95 border border-amber-800/60 rounded-lg shadow-lg p-3">
    <div class="flex items-center justify-between">
      <div class="text-amber-100 font-semibold text-sm">
        {{ dialogue?.speaker || dialogue?.npcName }}
      </div>
      <button class="text-amber-400 hover:text-amber-200 text-xs" (click)="close()">Close</button>
    </div>
    <div class="mt-2 text-amber-200 text-sm leading-relaxed">
      {{ dialogue?.text }}
    </div>
    <div class="mt-3 space-y-2">
      <button
        *ngFor="let choice of dialogue?.choices; let i = index"
        class="w-full text-left px-3 py-2 rounded border border-amber-700/50 text-amber-200 hover:bg-amber-800/40"
        (click)="selectChoice(i)"
      >
        {{ choice.text }}
      </button>
    </div>
  </div>
</div>
