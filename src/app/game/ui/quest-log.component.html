<div *ngIf="isOpen" class="fixed inset-0 z-50">
  <div class="absolute inset-0 bg-black/50" (click)="close()"></div>
  <div class="absolute inset-x-0 bottom-0 h-[85vh] sm:h-[75vh] bg-amber-950 border-t border-amber-800/60 rounded-t-2xl overflow-hidden panel-sheet">
    <div class="p-3 border-b border-amber-800/50 flex items-center justify-between">
      <div class="flex items-center gap-2 text-amber-100">
        <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span class="text-sm sm:text-base">Quest Journal</span>
      </div>
      <button class="text-amber-400 hover:text-amber-200" (click)="close()" aria-label="Close">✕</button>
    </div>

    <div class="flex gap-2 px-3 py-2 border-b border-amber-800/30">
      <button
        class="px-3 py-1 rounded text-xs"
        [ngClass]="activeTab === 'active' ? 'bg-amber-700/60 text-amber-100' : 'bg-amber-900/30 text-amber-300'"
        (click)="activeTab = 'active'"
      >
        Active ({{ activeQuests.length }})
      </button>
      <button
        class="px-3 py-1 rounded text-xs"
        [ngClass]="activeTab === 'completed' ? 'bg-amber-700/60 text-amber-100' : 'bg-amber-900/30 text-amber-300'"
        (click)="activeTab = 'completed'"
      >
        Completed ({{ completedQuests.length }})
      </button>
    </div>

    <div class="p-3 overflow-y-auto h-[calc(85vh-96px)]">
      <ng-container *ngIf="activeTab === 'active'">
        <div *ngIf="activeQuests.length === 0" class="text-amber-400/70 text-sm">No active quests.</div>
        <div *ngFor="let active of activeQuests" class="mb-3 bg-amber-950/60 border border-amber-800/40 rounded-lg p-3">
          <div class="text-amber-100 font-semibold">
            {{ getQuest(active.questId)?.title || 'Unknown Quest' }}
          </div>
          <div class="text-xs text-amber-400/80 mb-2">
            {{ getQuest(active.questId)?.description }}
          </div>
          <div class="space-y-1 text-xs text-amber-300">
            <div *ngFor="let obj of getObjectives(getQuest(active.questId)!, active)">
              <span [ngClass]="isObjectiveComplete(obj, active) ? 'line-through text-amber-500/60' : ''">
                • {{ obj.description }}
              </span>
            </div>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="activeTab === 'completed'">
        <div *ngIf="completedQuests.length === 0" class="text-amber-400/70 text-sm">No completed quests yet.</div>
        <div *ngFor="let completed of completedQuests" class="mb-3 bg-amber-950/60 border border-amber-800/40 rounded-lg p-3">
          <div class="text-amber-100 font-semibold">
            {{ completed.title }}
          </div>
          <div class="text-xs text-amber-400/80">
            {{ completed.description }}
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
