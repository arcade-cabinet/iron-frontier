<div
  class="fixed inset-0 z-40 flex items-center justify-center bg-black/70 backdrop-blur-sm p-3"
  *ngIf="travel"
  data-testid="travel-panel"
>
  <div
    class="w-full max-w-3xl rounded-xl border border-amber-800/60 bg-amber-950/95 shadow-2xl"
  >
    <div class="flex flex-col gap-2 border-b border-amber-800/50 p-4">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-xs uppercase tracking-widest text-amber-500">Traveling</div>
          <div class="text-lg font-semibold text-amber-100">
            {{ fromName }} → {{ toName }}
          </div>
        </div>
        <button
          type="button"
          class="min-h-[44px] rounded-md border border-amber-700/60 px-3 py-1.5 text-xs font-semibold text-amber-200 transition hover:bg-amber-900/40"
          (click)="cancelTravel()"
        >
          Cancel Travel
        </button>
      </div>

      <div class="space-y-2">
        <div class="text-[10px] uppercase tracking-widest text-amber-500/80">Progress</div>
        <div class="relative h-4 overflow-hidden rounded-full border border-amber-700/50 bg-amber-900/40">
          <div
            class="absolute inset-0 opacity-20"
            style="
              background-image:
                repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(255, 255, 255, 0.1) 10px, rgba(255, 255, 255, 0.1) 12px);
            "
          ></div>
          <div
            class="h-full rounded-full bg-gradient-to-r from-amber-600 to-amber-500 transition-all"
            [style.width.%]="progressPercent"
          ></div>
          <div
            class="absolute -top-1 h-6 w-1 rounded-full bg-amber-200"
            [style.left.%]="progressPercent"
          ></div>
        </div>
        <div class="flex items-center justify-between text-[10px] text-amber-500/80">
          <span>{{ progressPercent | number: '1.0-0' }}% complete</span>
          <span>{{ travel?.travelTime }}h via {{ travel?.method }}</span>
        </div>
      </div>
    </div>

    <div class="grid gap-3 p-4 sm:grid-cols-3">
      <div class="rounded-lg border border-amber-800/40 bg-amber-900/30 p-3">
        <div class="flex items-center gap-2">
          <div
            class="flex h-9 w-9 items-center justify-center rounded-md border border-amber-700/40 bg-amber-900/60"
          >
            <svg
              class="h-5 w-5 text-amber-300"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 10c-1-3-4-6-7-6-2 0-4 2-5 4-2-1-4-1-6 1-1 1-2 3-2 5 0 3 2 6 5 6h4l1 2h4l1-2h2c2 0 3-1 4-3 0-2-1-5-1-7z" />
              <path d="M5 11c0 1 1 2 2 2" />
            </svg>
          </div>
          <div>
            <div class="text-[10px] uppercase tracking-widest text-amber-500">Method</div>
            <div class="text-sm font-semibold text-amber-100 capitalize">{{ travel?.method }}</div>
          </div>
        </div>
      </div>

      <div class="rounded-lg border border-amber-800/40 bg-amber-900/30 p-3">
        <div class="flex items-center gap-2">
          <div
            class="flex h-9 w-9 items-center justify-center rounded-md border border-amber-700/40 bg-amber-900/60"
          >
            <svg
              class="h-5 w-5 text-amber-300"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88" fill="currentColor" />
            </svg>
          </div>
          <div>
            <div class="text-[10px] uppercase tracking-widest text-amber-500">Duration</div>
            <div class="text-sm font-semibold text-amber-100">{{ travel?.travelTime }} hours</div>
          </div>
        </div>
      </div>

      <div class="rounded-lg border border-amber-800/40 bg-amber-900/30 p-3">
        <div class="flex items-center gap-2">
          <div
            class="flex h-9 w-9 items-center justify-center rounded-md border border-amber-700/40 bg-amber-900/60"
          >
            <svg
              class="h-5 w-5 text-amber-300"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="10" r="7" />
              <path d="M8 10a1 1 0 1 0 2 0 1 1 0 1 0-2 0" />
              <path d="M14 10a1 1 0 1 0 2 0 1 1 0 1 0-2 0" />
              <path d="M9 17v4h2v-2h2v2h2v-4" />
              <path d="M12 14v1" />
            </svg>
          </div>
          <div>
            <div class="text-[10px] uppercase tracking-widest text-amber-500">Danger</div>
            <div class="text-sm font-semibold capitalize" [ngClass]="dangerClass">
              {{ travel?.dangerLevel }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="border-t border-amber-800/40 p-4">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div class="text-xs text-amber-400/80">
          Stay alert. Encounters may interrupt travel.
        </div>
        <div class="flex flex-wrap gap-2">
          <button
            type="button"
            class="min-h-[44px] rounded-md border border-amber-700/50 px-4 py-2 text-xs font-semibold text-amber-200 transition hover:bg-amber-900/40"
            (click)="cancelTravel()"
          >
            Return
          </button>
          <button
            type="button"
            class="min-h-[44px] rounded-md bg-amber-600 px-4 py-2 text-xs font-semibold text-amber-950 transition hover:bg-amber-500"
            (click)="completeTravel()"
            *ngIf="progressPercent >= 100"
          >
            Arrive
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
