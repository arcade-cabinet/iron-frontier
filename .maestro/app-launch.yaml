# App Launch Test - Iron Frontier
# Verifies app launches correctly and displays the main screen
# This test validates the splash screen animation and transition to title screen

appId: com.arcade_cabinet.iron_frontier
name: "App Launch Smoke"
tags:
  - smoke
  - launch

---

# Launch the app
- launchApp:
    appId: com.arcade_cabinet.iron_frontier
    clearState: true

# Wait for app to initialize
- extendedWaitUntil:
    visible: "Iron Frontier"
    timeout: 15000

# Verify the title is visible
- assertVisible:
    text: "Iron Frontier"

# Test passes if we reach here
- runScript:
    script: |
      console.log('App launch smoke test completed successfully');
      output.launchSuccess = true;
